# GitHub Actions — автоматическая сборка APK при push в main
# Артефакт доступен во вкладке Actions → Build APK → Artifacts

name: Build APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Ручной запуск из вкладки Actions

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      # ================== Checkout ==================
      - name: Checkout repository
        uses: actions/checkout@v4

      # ================== JDK 17 ==================
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ================== Android SDK ==================
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ================== Cache Gradle ==================
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ================== Build APK ==================
      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew 2>/dev/null || true
          ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          # GitHub Actions автоматически кэширует Gradle
          GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2

      # ================== Upload Artifact ==================
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: instacapture-release
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ================== Create Release (manual only) ==================
      - name: Create Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/release/*.apk
          tag_name: v${{ github.run_number }}
          name: InstaCapture Release ${{ github.run_number }}
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
